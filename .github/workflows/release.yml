name: pdf-fmt Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: ubuntu-latest
            arch: x64
          - os: macos-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v6

      - name: Set Version and OS-Specific Flags
        id: set_flags
        shell: bash
        run: |
          VERSION_NUMBER="${GITHUB_REF_NAME}"
          echo "VERSION_NUMBER=${VERSION_NUMBER}" >> $GITHUB_ENV
          
          # Normalize OS naming for the filename
          OS_NAME=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ runner.os }}" == "Windows" ]; then
            echo "COMPILER_FLAG=mingw64" >> $GITHUB_ENV
            echo "EXECUTABLE_NAME=pdf-fmt-windows-${{ matrix.arch }}-${VERSION_NUMBER}.exe" >> $GITHUB_ENV
          else
            echo "COMPILER_FLAG=" >> $GITHUB_ENV
            echo "EXECUTABLE_NAME=pdf-fmt-${OS_NAME}-${{ matrix.arch }}-${VERSION_NUMBER}" >> $GITHUB_ENV
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # This will install the correct architecture of Python
          architecture: ${{ matrix.arch }}
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Build Executable
        uses: Nuitka/Nuitka-Action@main
        env:
          PDF_FMT_CI_BUILD: 1
          PDF_FMT_VERSION: ${{ env.VERSION_NUMBER }}
        with:
          nuitka-version: main
          script-name: build.py
          mode: app
          python-flag: no_docstrings
          deployment: on
          output-file: pdf-fmt
          product-version: ${{ env.VERSION_NUMBER }}
          mingw64: ${{ env.COMPILER_FLAG == 'mingw64' }}

      - name: Rename Executable for Release
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            mv build/*.exe ${{ env.EXECUTABLE_NAME }}
          elif [ "${{ runner.os }}" == "macOS" ]; then
            BINARY_PATH=$(find build -type f -name "pdf-fmt" | head -n 1)
            mv "$BINARY_PATH" ${{ env.EXECUTABLE_NAME }}
          else
            mv build/pdf-fmt ${{ env.EXECUTABLE_NAME }} || mv build/pdf-fmt.bin ${{ env.EXECUTABLE_NAME }}
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ env.EXECUTABLE_NAME }} > ${{ env.EXECUTABLE_NAME }}.sha256
          else
            shasum -a 256 ${{ env.EXECUTABLE_NAME }} > ${{ env.EXECUTABLE_NAME }}.sha256
          fi
          
      - name: Upload Renamed Executable
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ${{ env.EXECUTABLE_NAME }}
            ${{ env.EXECUTABLE_NAME }}.sha256
          retention-days: 1

  release:
    name: Create Draft Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release/
          merge-multiple: true 

      - name: Create Draft Release and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} release/* \
            --draft \
            --title "Version ${{ github.ref_name }}" \
            --notes "Automated multi-arch build." \
            --repo ${{ github.repository }}
